{% extends "base.html" %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
{% endblock %}

{% block topbar_actions %}
<div style="display:flex;align-items:center;gap:var(--sp-sm)">
  <span style="font-size:13px;color:var(--c-text-3)">年份：</span>
  <select class="form-select" id="year-select" style="width:100px">
    {% for y in range(current_year - 2, current_year + 1) %}
    <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
    {% endfor %}
  </select>
</div>
{% endblock %}

{% block content %}
<!-- Summary cards (filled by JS) -->
<div id="summary-cards" class="stat-grid" style="margin-bottom:var(--sp-xl)"></div>

<!-- Bar chart -->
<div class="card" style="margin-bottom:var(--sp-lg)">
  <div class="card-header">
    <span class="card-title">📊 各产品月度拜访次数</span>
    <span id="chart-year-label" style="font-size:12px;color:var(--c-text-3)"></span>
  </div>
  <div class="chart-wrap" style="height:320px">
    <canvas id="product-chart"></canvas>
  </div>
</div>

<!-- Data table -->
<div class="card">
  <div class="card-header">
    <span class="card-title">📋 产品月度拜访明细</span>
  </div>
  <div id="product-table-wrap" style="overflow-x:auto">
    <div class="loading-overlay"><div class="spinner"></div></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let productChart = null;
const MONTH_LABELS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

const PRODUCT_COLORS = [
  '#00b4d8', '#3fb950', '#d29922', '#f85149', '#bf91f9',
  '#fd8c73', '#56d364', '#79c0ff', '#ffa657', '#ff7b72',
];

async function loadData(year) {
  try {
    const data = await window.api.get(`/api/v1/stats/product-visits?year=${year}`);
    document.getElementById('chart-year-label').textContent = `${year}年`;
    renderSummary(data.data);
    renderChart(data.data);
    renderTable(data.data);
  } catch (e) {
    window.toast.error('加载看板数据失败：' + e.message);
  }
}

function renderSummary(products) {
  const container = document.getElementById('summary-cards');
  const totalVisits = products.reduce((a, p) => a + p.total_visits, 0);
  const totalCompleted = products.reduce((a, p) => a + p.total_completed, 0);
  const totalCompliant = products.reduce((a, p) => a + Math.round(p.total_completed * p.compliance_rate), 0);
  const overallRate = totalCompleted ? Math.round(totalCompliant / totalCompleted * 100) : 0;

  container.innerHTML = `
    <div class="stat-card cyan">
      <div class="stat-label">年度总拜访</div>
      <div class="stat-value">${totalVisits}</div>
      <div class="stat-sub">${products.length} 个产品</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">已完成拜访</div>
      <div class="stat-value">${totalCompleted}</div>
      <div class="stat-sub">完成率 ${totalVisits ? Math.round(totalCompleted/totalVisits*100) : 0}%</div>
    </div>
    <div class="stat-card yellow">
      <div class="stat-label">合规拜访</div>
      <div class="stat-value">${totalCompliant}</div>
      <div class="stat-sub">合规率 ${overallRate}%</div>
    </div>
    <div class="stat-card red">
      <div class="stat-label">活跃产品</div>
      <div class="stat-value">${products.filter(p => p.total_visits > 0).length}</div>
      <div class="stat-sub">有拜访记录</div>
    </div>`;
}

function renderChart(products) {
  if (productChart) productChart.destroy();

  const datasets = products.map((p, i) => ({
    label: p.product_name,
    data: p.monthly_counts.map(m => m.visit_count),
    backgroundColor: PRODUCT_COLORS[i % PRODUCT_COLORS.length] + 'aa',
    borderColor: PRODUCT_COLORS[i % PRODUCT_COLORS.length],
    borderWidth: 1.5,
    borderRadius: 4,
  }));

  const ctx = document.getElementById('product-chart').getContext('2d');
  productChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: MONTH_LABELS, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'top',
          labels: { color: '#8b949e', font: { size: 11 }, boxWidth: 12, padding: 12 },
        },
        tooltip: {
          callbacks: {
            afterLabel: (ctx) => {
              const p = products[ctx.datasetIndex];
              const m = p.monthly_counts[ctx.dataIndex];
              return `  完成: ${m.completed_count}  合规: ${m.compliant_count}`;
            },
          },
        },
      },
      scales: {
        x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
        y: {
          beginAtZero: true,
          ticks: { color: '#8b949e', precision: 0 },
          grid: { color: '#30363d' },
        },
      },
      interaction: { mode: 'index', intersect: false },
    },
  });
}

function renderTable(products) {
  const wrap = document.getElementById('product-table-wrap');
  if (!products.length) {
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">暂无数据</div></div>';
    return;
  }

  const headerCells = MONTH_LABELS.map(m => `<th style="min-width:56px;text-align:center">${m}</th>`).join('');

  const rows = products.map((p, i) => {
    const color = PRODUCT_COLORS[i % PRODUCT_COLORS.length];
    const monthCells = p.monthly_counts.map(m => {
      if (!m.visit_count) return `<td style="text-align:center;color:var(--c-text-3)">—</td>`;
      const rate = m.completed_count ? Math.round(m.compliant_count / m.completed_count * 100) : 0;
      return `<td style="text-align:center">
        <div style="font-size:14px;font-weight:600;color:var(--c-text)">${m.visit_count}</div>
        <div style="font-size:10px;color:${rate >= 80 ? 'var(--c-checkin)' : rate >= 60 ? 'var(--c-checkout)' : 'var(--c-major)'}">
          ${m.completed_count ? rate + '%合规' : ''}
        </div>
      </td>`;
    }).join('');

    return `<tr>
      <td style="position:sticky;left:0;background:var(--c-bg-2);z-index:1;white-space:nowrap">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0"></div>
          <div>
            <div style="font-size:13px;font-weight:600;color:var(--c-text)">${p.product_name}</div>
            <div style="font-size:10px;color:var(--c-text-3)">${p.therapeutic_area || ''}</div>
          </div>
        </div>
      </td>
      ${monthCells}
      <td style="text-align:center;border-left:1px solid var(--c-border)">
        <div style="font-size:15px;font-weight:700;color:var(--c-cyan)">${p.total_visits}</div>
        <div style="font-size:10px;color:${p.compliance_rate >= 0.8 ? 'var(--c-checkin)' : p.compliance_rate >= 0.6 ? 'var(--c-checkout)' : 'var(--c-major)'}">
          ${p.total_completed ? Math.round(p.compliance_rate * 100) + '%合规' : ''}
        </div>
      </td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <table style="width:100%;border-collapse:collapse">
      <thead>
        <tr style="border-bottom:1px solid var(--c-border)">
          <th style="text-align:left;padding:var(--sp-sm) var(--sp-md);position:sticky;left:0;background:var(--c-bg-2);color:var(--c-text-2);font-size:11px;text-transform:uppercase;letter-spacing:0.06em">产品</th>
          ${headerCells}
          <th style="text-align:center;border-left:1px solid var(--c-border);color:var(--c-text-2);font-size:11px;text-transform:uppercase">年度</th>
        </tr>
      </thead>
      <tbody>
        ${rows.replace(/(<tr>|<\/tr>)/g, m =>
          m === '<tr>' ? '<tr style="border-bottom:1px solid var(--c-border);transition:background 0.15s" onmouseover="this.style.background=\'var(--c-bg-3)\'" onmouseout="this.style.background=\'\'">' : m)}
      </tbody>
    </table>
    <div style="font-size:11px;color:var(--c-text-3);padding:var(--sp-sm) var(--sp-md);border-top:1px solid var(--c-border)">
      * 单元格数值为拜访次数，颜色显示合规率（绿色≥80%，黄色60-80%，红色&lt;60%）
    </div>`;
}

// Year selector
document.getElementById('year-select').addEventListener('change', (e) => {
  loadData(parseInt(e.target.value));
});

loadData({{ current_year }});
</script>
{% endblock %}
